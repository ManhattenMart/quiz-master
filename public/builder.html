<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Master — Build a Quiz</title>
<link rel="stylesheet" href="shared.css" />
<style>
  .round-card { border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px; margin-top: 16px; background: var(--panel-2); }
  .question-card { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; margin-top: 12px; background: var(--panel); }
  .field-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; display: block; }
  .field { margin-bottom: 10px; }
  .option-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .option-row input[type=radio] { width: 20px; height: 20px; }
  .list-item { display: flex; justify-content: space-between; align-items: center; background: var(--panel-2); padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; }
  .icon-btn { background: transparent; border: none; color: var(--muted); font-size: 18px; padding: 4px 8px; }
  .icon-btn:hover { color: var(--text); }
</style>
</head>
<body>
<div class="wrap" style="max-width:760px;">

  <div class="title-row">
    <div class="brand">🎬 Quiz Master <span class="dot">Builder</span></div>
    <a href="host.html"><button class="secondary">Host a Game ▶</button></a>
  </div>

  <!-- LIST VIEW -->
  <div id="view-list" class="card">
    <h2>Your Quizzes</h2>
    <p class="muted small">Build a quiz here with a form — no files or JSON needed. Once saved, it shows up on the Host page ready to play.</p>
    <div id="quiz-list"></div>
    <div class="row" style="margin-top:16px;">
      <button id="btn-new-quiz">+ New Quiz</button>
    </div>
  </div>

  <!-- EDITOR VIEW -->
  <div id="view-editor" class="card" style="display:none;">
    <div class="row between">
      <h2 style="margin:0;">Edit Quiz</h2>
      <button class="ghost" id="btn-back-to-list">← Back to list</button>
    </div>

    <div class="field" style="margin-top:16px;">
      <label class="field-label">Quiz title</label>
      <input id="quiz-title" placeholder="e.g. Friday Night Quiz" style="width:100%;" />
    </div>

    <div id="rounds-container"></div>

    <div class="row" style="margin-top:16px;">
      <button class="secondary" id="btn-add-round">+ Add Round</button>
    </div>

    <div class="row" style="margin-top:24px; justify-content:flex-end; gap:10px;">
      <div id="save-status" class="muted small" style="align-self:center;"></div>
      <button id="btn-save-quiz">Save Quiz</button>
    </div>
  </div>

</div>

<script src="builder.js"></script>
</body>
</html>
